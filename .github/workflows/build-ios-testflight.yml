name: Build iOS & Deploy to TestFlight (live wrapper for collinz.app)

# Pure-LIVE iOS build that mirrors the Android workflow: the IPA is a thin
# native shell loading https://collinz.app on every launch, with no bundled
# web code. Manual trigger only.
on:
  workflow_dispatch:
    inputs:
      upload_to_testflight:
        description: "Upload the built IPA to TestFlight"
        required: true
        default: true
        type: boolean

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: false

env:
  # The bundle identifier registered on Apple Developer Portal.
  # Must match `appId` in capacitor.config.ts.
  IOS_BUNDLE_ID: com.collinz.school

jobs:
  build:
    name: Archive & upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies (Capacitor CLI + assets only)
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Write minimal redirect placeholder into dist/
        # No Vite build -- the IPA carries no React code, no Supabase
        # keys, no UI. Every byte rendered comes from https://collinz.app.
        run: |
          mkdir -p dist
          cat > dist/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <meta http-equiv="refresh" content="0; url=https://collinz.app" />
            <title>Collinz School</title>
            <style>html,body{margin:0;padding:0;height:100%;background:#fff;font-family:system-ui,sans-serif}</style>
          </head>
          <body>
            <div style="display:flex;align-items:center;justify-content:center;height:100%">
              <p style="color:#666">Loading Collinz School…</p>
            </div>
            <script>window.location.replace('https://collinz.app');</script>
          </body>
          </html>
          EOF

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Add Capacitor iOS platform
        run: npx cap add ios

      - name: Verify Collinz brand assets exist
        run: |
          set -e
          test -f resources/icon.png || { echo "Missing resources/icon.png"; exit 1; }
          test -f resources/splash.png || { echo "Missing resources/splash.png"; exit 1; }

      - name: Generate iOS icons & splash from Collinz logo
        run: |
          npx capacitor-assets generate \
            --ios \
            --iconBackgroundColor "#ffffff" \
            --iconBackgroundColorDark "#1a1a1a" \
            --splashBackgroundColor "#ffffff" \
            --splashBackgroundColorDark "#1a1a1a"

      - name: Verify generated iOS splash & app icon assets
        run: |
          set -e
          ASSETS_DIR="ios/App/App/Assets.xcassets"

          if [ ! -d "$ASSETS_DIR/AppIcon.appiconset" ]; then
            echo "FATAL: AppIcon.appiconset missing -- the Collinz logo will not be the app icon."
            ls -la "$ASSETS_DIR" || true
            exit 1
          fi
          if [ ! -d "$ASSETS_DIR/Splash.imageset" ]; then
            echo "FATAL: Splash.imageset missing -- the Collinz logo will not be the launch image."
            ls -la "$ASSETS_DIR" || true
            exit 1
          fi

          echo "iOS Assets.xcassets contents:"
          ls -la "$ASSETS_DIR"
          echo ""
          echo "AppIcon files:"
          ls -la "$ASSETS_DIR/AppIcon.appiconset"
          echo ""
          echo "Splash files:"
          ls -la "$ASSETS_DIR/Splash.imageset"

      - name: Patch AppDelegate to disable WKWebView cache
        # Mirror the Android MainActivity patch: clear WKWebView website data
        # on every app launch so users never see stale https://collinz.app
        # HTML/JS/CSS after a deploy.
        run: |
          set -e
          APP_DELEGATE="ios/App/App/AppDelegate.swift"
          if [ ! -f "$APP_DELEGATE" ]; then
            echo "Expected AppDelegate at $APP_DELEGATE"
            find ios -name "AppDelegate.swift"
            exit 1
          fi
          cat > "$APP_DELEGATE" << 'EOF'
          import UIKit
          import Capacitor
          import WebKit

          @UIApplicationMain
          class AppDelegate: UIResponder, UIApplicationDelegate {

              var window: UIWindow?

              func application(_ application: UIApplication,
                               didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  // Wipe all WKWebView caches (disk + memory + cookies + local
                  // storage) on every cold start so the live wrapper always
                  // pulls fresh HTML/JS/CSS from https://collinz.app.
                  let dataStore = WKWebsiteDataStore.default()
                  let dataTypes = WKWebsiteDataStore.allWebsiteDataTypes()
                  dataStore.removeData(ofTypes: dataTypes,
                                       modifiedSince: Date(timeIntervalSince1970: 0)) {
                      NSLog("Collinz: cleared WKWebView website data on launch")
                  }
                  // Also disable the URLCache so HTTP responses never hit the
                  // shared cache.
                  URLCache.shared.removeAllCachedResponses()
                  URLCache.shared.diskCapacity = 0
                  URLCache.shared.memoryCapacity = 0
                  return true
              }

              func applicationWillResignActive(_ application: UIApplication) {}
              func applicationDidEnterBackground(_ application: UIApplication) {}
              func applicationWillEnterForeground(_ application: UIApplication) {}
              func applicationDidBecomeActive(_ application: UIApplication) {}
              func applicationWillTerminate(_ application: UIApplication) {}

              func application(_ application: UIApplication,
                               open url: URL,
                               options: [UIApplication.OpenURLOptionsKey: Any] = [:]) -> Bool {
                  return ApplicationDelegateProxy.shared.application(application, open: url, options: options)
              }

              func application(_ application: UIApplication,
                               continue userActivity: NSUserActivity,
                               restorationHandler: @escaping ([UIUserActivityRestoring]?) -> Void) -> Bool {
                  return ApplicationDelegateProxy.shared.application(application,
                                                                     continue: userActivity,
                                                                     restorationHandler: restorationHandler)
              }
          }
          EOF
          echo "Patched AppDelegate.swift:"
          cat "$APP_DELEGATE"

      - name: Sync placeholder webDir into iOS project
        run: npx cap sync ios

      - name: Verify AppDelegate cache patch survived sync
        run: |
          set -e
          if ! grep -q "WKWebsiteDataStore" ios/App/App/AppDelegate.swift; then
            echo "FATAL: WKWebView cache patch missing from AppDelegate after sync"
            cat ios/App/App/AppDelegate.swift
            exit 1
          fi
          echo "WKWebView cache-busting patch verified in AppDelegate.swift"

      - name: Bump iOS build number to GitHub run number
        working-directory: ios/App
        run: |
          agvtool new-version -all ${{ github.run_number }}
          plutil -p App/Info.plist | head -n 30 || true

      - name: Install Apple distribution certificate
        uses: Apple-Actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DIST_CERT_BASE64 }}
          p12-password: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          keychain: build
          keychain-password: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "$PROFILE_BASE64" | base64 --decode > "$PROFILE_DIR/build.mobileprovision"
          # Extract and print the UUID + Name so we can verify
          security cms -D -i "$PROFILE_DIR/build.mobileprovision" -o /tmp/profile.plist
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /tmp/profile.plist)
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" /tmp/profile.plist)
          echo "Installed profile: $PROFILE_NAME ($PROFILE_UUID)"
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"

      - name: Create ExportOptions.plist
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>${{ secrets.APPLE_TEAM_ID }}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>${{ env.IOS_BUNDLE_ID }}</key>
                  <string>${PROFILE_NAME}</string>
              </dict>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
              <key>destination</key>
              <string>export</string>
              <key>stripSwiftSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF
          cat "$RUNNER_TEMP/ExportOptions.plist"

      - name: Archive iOS app
        working-directory: ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PRODUCT_BUNDLE_IDENTIFIER="${{ env.IOS_BUNDLE_ID }}" \
            -allowProvisioningUpdates \
            clean archive | xcpretty || (echo "Archive failed"; exit 1)

      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            | xcpretty || (echo "Export failed"; exit 1)
          IPA_PATH=$(find "$RUNNER_TEMP/export" -name "*.ipa" | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA produced"
            ls -la "$RUNNER_TEMP/export"
            exit 1
          fi
          echo "IPA: $IPA_PATH"
          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: collinz-school-ios-LIVE-ipa
          path: ${{ env.IPA_PATH }}
          if-no-files-found: error
          retention-days: 30

      - name: Setup App Store Connect API key
        if: ${{ github.event.inputs.upload_to_testflight == 'true' }}
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_BASE64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8
          ls -la ~/.appstoreconnect/private_keys/

      - name: Validate IPA against App Store
        if: ${{ github.event.inputs.upload_to_testflight == 'true' }}
        run: |
          xcrun altool --validate-app \
            -f "$IPA_PATH" \
            -t ios \
            --apiKey "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}" \
            --output-format xml

      - name: Upload IPA to TestFlight
        if: ${{ github.event.inputs.upload_to_testflight == 'true' }}
        run: |
          xcrun altool --upload-app \
            -f "$IPA_PATH" \
            -t ios \
            --apiKey "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}" \
            --output-format xml

      - name: Clean up keychain & profiles
        if: always()
        run: |
          security delete-keychain build.keychain || true
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/build.mobileprovision || true
          rm -rf ~/.appstoreconnect/private_keys || true

      - name: Build summary
        if: always()
        run: |
          {
            echo "## iOS TestFlight Build"
            echo ""
            echo "- **Loads:** \`https://collinz.app\` (live wrapper, every launch)"
            echo "- **Bundle ID:** \`${{ env.IOS_BUNDLE_ID }}\`"
            echo "- **Build number:** \`${{ github.run_number }}\`"
            echo "- **Upload to TestFlight:** \`${{ github.event.inputs.upload_to_testflight }}\`"
            echo "- **Status:** ${{ job.status }}"
            if [ -n "${IPA_PATH:-}" ]; then
              SIZE=$(du -h "$IPA_PATH" 2>/dev/null | cut -f1)
              echo "- **IPA size:** $SIZE"
            fi
            if [ "${{ github.event.inputs.upload_to_testflight }}" = "true" ] && [ "${{ job.status }}" = "success" ]; then
              echo ""
              echo "App should appear in App Store Connect → TestFlight → iOS Builds within ~5-15 minutes (after Apple processing)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
