name: Build Android APK (native page + FCM topic)

# Loads bundled `dist/index.html` (no remote server.url).
# Subscribes to FCM topic `trem_test` on each cold start.
#
# Manual-only trigger.
on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Trem APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies (Capacitor CLI + assets only)
        # The full dependency tree is still installed so capacitor-assets,
        # @capacitor/cli, and @capacitor/android can run. The actual app
        # source tree is *not* compiled (no Vite build needed).
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Verify bundled dist/ exists
        run: |
          set -e
          test -f dist/index.html || { echo "Missing dist/index.html"; exit 1; }

      - name: Verify brand assets exist
        run: |
          set -e
          test -f resources/icon.png || { echo "Missing resources/icon.png"; exit 1; }
          # capacitor-assets still needs a static splash.png; use the app icon.
          cp resources/icon.png resources/splash.png

      - name: Setup JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-35 build-tools;35.0.0"

      - name: Add Capacitor Android platform
        run: npx cap add android

      - name: Inject Firebase config (google-services.json)
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          set -e
          if [ -z "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "FATAL: Missing secret GOOGLE_SERVICES_JSON_BASE64 (base64 of google-services.json)"
            exit 1
          fi
          # GitHub secrets sometimes end up with newlines/spaces; strip them.
          echo "$GOOGLE_SERVICES_JSON_BASE64" | tr -d '\r\n ' | base64 --decode > android/app/google-services.json
          test -s android/app/google-services.json

      - name: Enable Firebase Messaging (Gradle)
        run: |
          set -e
          ROOT_GRADLE="android/build.gradle"
          APP_GRADLE="android/app/build.gradle"

          if [ ! -f "$ROOT_GRADLE" ] || [ ! -f "$APP_GRADLE" ]; then
            echo "Expected Gradle files missing"
            ls -la android || true
            exit 1
          fi

          # 1) Ensure google-services Gradle plugin classpath exists
          if ! grep -q "com.google.gms:google-services" "$ROOT_GRADLE"; then
            perl -0777 -i -pe 's/(buildscript\\s*\\{[\\s\\S]*?dependencies\\s*\\{)/$1\\n        classpath \x27com.google.gms:google-services:4.4.2\x27/;' "$ROOT_GRADLE"
          fi

          # 2) Ensure app applies the google-services plugin
          if ! grep -q "com.google.gms.google-services" "$APP_GRADLE"; then
            printf "\napply plugin: 'com.google.gms.google-services'\n" >> "$APP_GRADLE"
          fi

          # 3) Ensure firebase-messaging dependency exists
          if ! grep -q "firebase-messaging" "$APP_GRADLE"; then
            perl -0777 -i -pe 's/(dependencies\\s*\\{)/$1\\n    implementation platform(\x27com.google.firebase:firebase-bom:34.0.0\x27)\\n    implementation \x27com.google.firebase:firebase-messaging\x27/;' "$APP_GRADLE"
          fi

      - name: Generate Android icons & splash
        run: |
          npx capacitor-assets generate \
            --android \
            --iconBackgroundColor "#ffffff" \
            --iconBackgroundColorDark "#1a1a1a" \
            --splashBackgroundColor "#ffffff" \
            --splashBackgroundColorDark "#1a1a1a"

      - name: Patch MainActivity (subscribe topic trem_test)
        run: |
          set -e
          APP_PKG_DIR="android/app/src/main/java/com/tremendousinc/trem"
          if [ ! -d "$APP_PKG_DIR" ]; then
            echo "Expected MainActivity dir at $APP_PKG_DIR"
            find android/app/src/main/java -type d
            exit 1
          fi
          cat > "$APP_PKG_DIR/MainActivity.java" << 'EOF'
          package com.tremendousinc.trem;

          import android.os.Handler;
          import android.os.Bundle;
          import android.os.Looper;
          import android.util.Log;

          import com.getcapacitor.BridgeActivity;

          /**
           * Trem wrapper: loads bundled dist/index.html.
           * Subscribes to FCM topic "trem_test" on every cold start.
           */
          public class MainActivity extends BridgeActivity {
              private static final String TAG = "TremNav";

              private volatile String lastPushTopic = "trem_test";
              private volatile Boolean lastPushOk = null;
              private volatile String lastPushError = null;

              private void rememberPushResult(String topic, Boolean ok, String error) {
                  lastPushTopic = topic;
                  lastPushOk = ok;
                  lastPushError = error;
              }

              private void emitPushStatus(String topic, boolean ok, String error) {
                  try {
                      if (this.bridge == null || this.bridge.getWebView() == null) return;
                      String safeError = (error == null) ? "" : error.replace("\\", "\\\\").replace("\"", "\\\"");
                      String js =
                          "window.__tremPush = {" +
                          "topic: \"" + topic + "\"," +
                          "ok: " + (ok ? "true" : "false") + "," +
                          "error: \"" + safeError + "\"," +
                          "ts: Date.now()" +
                          "};" +
                          "window.dispatchEvent(new CustomEvent('tremPush', { detail: window.__tremPush }));";
                      this.bridge.getWebView().post(() -> this.bridge.getWebView().evaluateJavascript(js, null));
                  } catch (Throwable ignored) {}
              }

              private void emitPushStatusWhenReady() {
                  // WebView may not have navigated to dist/index.html yet during onCreate.
                  // Retry a few times until URL exists, then emit the last known status.
                  try {
                      if (this.bridge == null || this.bridge.getWebView() == null) return;
                      final com.getcapacitor.BridgeActivity self = this;
                      final int[] tries = {0};
                      final Runnable r = new Runnable() {
                          @Override public void run() {
                              tries[0]++;
                              try {
                                  if (bridge == null || bridge.getWebView() == null) return;
                                  String url = bridge.getWebView().getUrl();
                                  if (url == null || url.length() == 0) {
                                      if (tries[0] < 15) bridge.getWebView().postDelayed(this, 400);
                                      return;
                                  }
                                  // If we don't have a result yet, emit a soft failure so UI isn't stuck.
                                  if (lastPushOk == null) {
                                      emitPushStatus(lastPushTopic, false, "Subscribe not completed yet");
                                  } else {
                                      emitPushStatus(lastPushTopic, lastPushOk.booleanValue(), lastPushError);
                                  }
                              } catch (Throwable ignored) {}
                          }
                      };
                      bridge.getWebView().postDelayed(r, 400);
                  } catch (Throwable ignored) {}
              }

              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  // Always emit some status shortly after launch so the UI never stays "pending".
                  new Handler(Looper.getMainLooper()).postDelayed(() -> {
                      if (lastPushOk == null) {
                          rememberPushResult("trem_test", false, "Waiting for subscribe result");
                          emitPushStatusWhenReady();
                      }
                  }, 2500);

                  // Use reflection so the app still compiles even if the
                  // firebase-messaging symbol isn't on the app module's
                  // compile classpath.
                  try {
                      Class<?> cls = Class.forName("com.google.firebase.messaging.FirebaseMessaging");
                      Object inst = cls.getMethod("getInstance").invoke(null);
                      Object task = cls.getMethod("subscribeToTopic", String.class).invoke(inst, "trem_test");

                      // Avoid depending on gms-tasks types at compile time.
                      task.getClass().getMethod("addOnCompleteListener", java.util.concurrent.Executor.class,
                              Class.forName("com.google.android.gms.tasks.OnCompleteListener"))
                          .invoke(task,
                              java.util.concurrent.Executors.newSingleThreadExecutor(),
                              java.lang.reflect.Proxy.newProxyInstance(
                                  ClassLoader.getSystemClassLoader(),
                                  new Class[] { Class.forName("com.google.android.gms.tasks.OnCompleteListener") },
                                  (proxy, method, args) -> {
                                      if ("onComplete".equals(method.getName()) && args != null && args.length == 1) {
                                          Object t = args[0];
                                          boolean ok = (boolean) t.getClass().getMethod("isSuccessful").invoke(t);
                                          if (ok) {
                                              Log.i(TAG, "Subscribed to topic trem_test");
                                              rememberPushResult("trem_test", true, null);
                                              emitPushStatusWhenReady();
                                          } else {
                                              Object ex = t.getClass().getMethod("getException").invoke(t);
                                              Log.w(TAG, "Subscribe to topic trem_test failed: " + ex);
                                              rememberPushResult("trem_test", false, String.valueOf(ex));
                                              emitPushStatusWhenReady();
                                          }
                                      }
                                      return null;
                                  }
                              )
                          );
                  } catch (Throwable e) {
                      Log.w(TAG, "FirebaseMessaging not available; skipped topic subscribe", e);
                      rememberPushResult("trem_test", false, "FirebaseMessaging not available");
                      emitPushStatusWhenReady();
                  }
              }
          }
          EOF
          echo "Patched MainActivity.java:"
          cat "$APP_PKG_DIR/MainActivity.java"

      - name: Verify generated Android splash & launcher icon resources
        run: |
          set -e
          RES_DIR="android/app/src/main/res"
          if ! find "$RES_DIR" -name "splash.png" | grep -q .; then
            echo "FATAL: No splash.png was generated"
            exit 1
          fi
          for NAME in ic_launcher.png ic_launcher_round.png ic_launcher_foreground.png; do
            if ! find "$RES_DIR" -name "$NAME" | grep -q .; then
              echo "FATAL: $NAME not generated"
              exit 1
            fi
          done
          echo "Splash + launcher icons verified."

      - name: Sync placeholder webDir into Android project
        run: npx cap sync android

      - name: Re-inject google-services.json after sync
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          set -e
          if [ -z "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "FATAL: Missing secret GOOGLE_SERVICES_JSON_BASE64 (base64 of google-services.json)"
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON_BASE64" | tr -d '\r\n ' | base64 --decode > android/app/google-services.json
          test -s android/app/google-services.json

      - name: Re-enable Firebase Messaging (Gradle) after sync
        run: |
          set -e
          ROOT_GRADLE="android/build.gradle"
          APP_GRADLE="android/app/build.gradle"

          # Ensure Google Maven repo is available.
          # Capacitor templates usually include it, but enforce to avoid missing artifacts.
          if ! grep -qE '(^|\\s)google\\(\\)' "$ROOT_GRADLE"; then
            perl -0777 -i -pe 's/(allprojects\\s*\\{[\\s\\S]*?repositories\\s*\\{)/$1\\n        google()\\n        mavenCentral()/;' "$ROOT_GRADLE"
          fi

          # 1) Ensure google-services Gradle plugin classpath exists
          if ! grep -q "com.google.gms:google-services" "$ROOT_GRADLE"; then
            perl -0777 -i -pe 's/(buildscript\\s*\\{[\\s\\S]*?dependencies\\s*\\{)/$1\\n        classpath \x27com.google.gms:google-services:4.4.2\x27/;' "$ROOT_GRADLE"
          fi

          # 2) Ensure app applies the google-services plugin
          if ! grep -q "com.google.gms.google-services" "$APP_GRADLE"; then
            printf "\napply plugin: 'com.google.gms.google-services'\n" >> "$APP_GRADLE"
          fi

          # 3) Ensure firebase-messaging dependency exists
          if ! grep -q "firebase-messaging" "$APP_GRADLE"; then
            cat >> "$APP_GRADLE" <<'EOF'

dependencies {
  implementation platform('com.google.firebase:firebase-bom:34.0.0')
  implementation 'com.google.firebase:firebase-messaging'
}
EOF
          fi

      - name: Verify Firebase Gradle wiring
        run: |
          set -e
          test -s android/app/google-services.json
          echo "---- android/build.gradle (firebase snippets) ----"
          grep -n "google()" -n android/build.gradle || true
          grep -n "google-services" -n android/build.gradle || true
          echo "---- android/app/build.gradle (firebase snippets) ----"
          grep -n "google-services" -n android/app/build.gradle || true
          grep -n "firebase-bom" -n android/app/build.gradle || true
          grep -n "firebase-messaging" -n android/app/build.gradle || true
          echo "---- android/app/build.gradle (tail) ----"
          tail -n 60 android/app/build.gradle || true
          # Hard fail if dependency isn't present (otherwise app runs without FirebaseMessaging).
          grep -q "firebase-messaging" android/app/build.gradle

      - name: Verify MainActivity patch survived sync
        run: |
          set -e
          MA="android/app/src/main/java/com/tremendousinc/trem/MainActivity.java"
          for NEEDLE in \
              "TremNav" \
              "Class.forName(\"com.google.firebase.messaging.FirebaseMessaging\")" \
              "trem_test"; do
            if ! grep -q "$NEEDLE" "$MA"; then
              echo "FATAL: '$NEEDLE' missing from MainActivity.java after sync"
              cat "$MA"
              exit 1
            fi
          done
          echo "MainActivity FCM topic subscribe patch verified."

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x ./gradlew

      - name: Build debug APK (auto-signed, installable on any device)
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Locate debug APK
        id: locate_debug
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No debug APK was produced."
            ls -la android/app/build/outputs/apk/debug || true
            exit 1
          fi
          echo "Found debug APK: $APK_PATH"
          SIZE=$(du -h "$APK_PATH" | cut -f1)
          echo "Size: $SIZE"
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "apk_size=$SIZE" >> "$GITHUB_OUTPUT"

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: trem-test-DEBUG-apk
          path: ${{ steps.locate_debug.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 30

      - name: Build unsigned release APK (for future Play Store signing)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Locate unsigned release APK
        id: locate_release
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No release APK was produced."
            ls -la android/app/build/outputs/apk/release || true
            exit 1
          fi
          SIZE=$(du -h "$APK_PATH" | cut -f1)
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "apk_size=$SIZE" >> "$GITHUB_OUTPUT"

      - name: Upload unsigned release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: trem-test-unsigned-release-apk
          path: ${{ steps.locate_release.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 30

      - name: Build summary
        if: always()
        run: |
          {
            echo "## Android APK Build — Trem"
            echo ""
            echo "- **Loads:** bundled \`dist/index.html\`"
            echo "- **Push:** subscribes to topic \`trem_test\` on cold start"
            echo "- **Status:** ${{ job.status }}"
            echo ""
            echo "### Artifacts"
            echo ""
            if [ -n "${{ steps.locate_debug.outputs.apk_path }}" ]; then
              echo "- **\`trem-test-DEBUG-apk\`** (${{ steps.locate_debug.outputs.apk_size }}) — install this on phones."
            fi
            if [ -n "${{ steps.locate_release.outputs.apk_path }}" ]; then
              echo "- \`trem-test-unsigned-release-apk\` (${{ steps.locate_release.outputs.apk_size }}) — keep for Play Store signing later."
            fi
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
