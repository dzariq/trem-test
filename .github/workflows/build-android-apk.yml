name: Build Android APK (live wrapper for collinz.app)

# Pure-LIVE build: the APK is a thin native shell that loads
# https://collinz.app on every launch. There is no bundled web build,
# no env vars baked in, and no local UI. WebView caching is disabled
# so users always see the latest deploy.
#
# Manual-only trigger.
on:
  workflow_dispatch:

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

env:
  LIVE_URL: https://collinz.app

jobs:
  build:
    name: Build live-wrapper APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies (Capacitor CLI + assets only)
        # The full dependency tree is still installed so capacitor-assets,
        # @capacitor/cli, and @capacitor/android can run. The actual app
        # source tree is *not* compiled because the app is a live wrapper.
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Write minimal redirect placeholder into dist/
        # capacitor sync requires webDir to exist. We intentionally do NOT
        # run `npm run build` -- no React, no Vite output, no env vars
        # land in the APK. This file only exists as a defensive fallback
        # in case server.url ever fails to load.
        run: |
          mkdir -p dist
          cat > dist/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <meta http-equiv="refresh" content="0; url=https://collinz.app" />
            <title>Collinz School</title>
            <style>
              html, body { margin: 0; padding: 0; height: 100%; background: #ffffff; font-family: system-ui, sans-serif; }
              .wrap { display: flex; align-items: center; justify-content: center; height: 100%; flex-direction: column; }
              .wrap p { color: #666; font-size: 14px; margin-top: 12px; }
            </style>
          </head>
          <body>
            <div class="wrap">
              <p>Loading Collinz School…</p>
              <noscript>
                Please enable JavaScript and ensure you have an internet connection.
                <a href="https://collinz.app">Open in browser</a>.
              </noscript>
            </div>
            <script>window.location.replace('https://collinz.app');</script>
          </body>
          </html>
          EOF
          echo "Placeholder webDir contents:"
          ls -la dist/

      - name: Verify Collinz brand assets exist
        run: |
          set -e
          test -f resources/icon.png || { echo "Missing resources/icon.png"; exit 1; }
          test -f resources/splash.png || { echo "Missing resources/splash.png"; exit 1; }

      - name: Setup JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-35 build-tools;35.0.0"

      - name: Add Capacitor Android platform
        run: npx cap add android

      - name: Generate Android icons & splash from Collinz logo
        run: |
          npx capacitor-assets generate \
            --android \
            --iconBackgroundColor "#ffffff" \
            --iconBackgroundColorDark "#1a1a1a" \
            --splashBackgroundColor "#ffffff" \
            --splashBackgroundColorDark "#1a1a1a"

      - name: Patch MainActivity with no-cache + debug URL bar
        run: |
          set -e
          APP_PKG_DIR="android/app/src/main/java/com/collinz/school"
          if [ ! -d "$APP_PKG_DIR" ]; then
            echo "Expected MainActivity dir at $APP_PKG_DIR"
            find android/app/src/main/java -type d
            exit 1
          fi
          cat > "$APP_PKG_DIR/MainActivity.java" << 'EOF'
          package com.collinz.school;

          import android.graphics.Color;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.util.Log;
          import android.view.Gravity;
          import android.view.ViewGroup;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.widget.FrameLayout;
          import android.widget.TextView;

          import com.getcapacitor.BridgeActivity;

          /**
           * Thin live-wrapper activity for https://collinz.app.
           *
           * Responsibilities:
           *   1. Disable WebView caching so users never see stale HTML/JS/CSS
           *      after a deploy.
           *   2. Enable chrome://inspect remote DevTools debugging for the
           *      embedded WebView.
           *   3. Render a tappable sticky overlay at the top of the screen
           *      showing the current WebView URL in real time -- so we can
           *      see exactly where the WebView lands after, e.g., a Supabase
           *      login redirect that should send the user to /portal.
           *   4. Mirror every URL change to logcat under tag "CollinzNav".
           */
          public class MainActivity extends BridgeActivity {

              private static final String TAG = "CollinzNav";

              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  WebView webView = (this.bridge != null) ? this.bridge.getWebView() : null;
                  if (webView == null) {
                      return;
                  }

                  // --- Cache busting ---
                  WebSettings settings = webView.getSettings();
                  settings.setCacheMode(WebSettings.LOAD_NO_CACHE);
                  webView.clearCache(true);
                  webView.clearHistory();

                  // --- chrome://inspect remote DevTools ---
                  WebView.setWebContentsDebuggingEnabled(true);

                  // --- Sticky URL overlay (debug aid) ---
                  final TextView urlBar = new TextView(this);
                  urlBar.setText("Loading…");
                  urlBar.setTextColor(Color.WHITE);
                  urlBar.setBackgroundColor(0xCC0F172A); // semi-transparent slate-900
                  float density = getResources().getDisplayMetrics().density;
                  int paddingPx = (int) (10 * density);
                  urlBar.setPadding(paddingPx, paddingPx, paddingPx, paddingPx);
                  urlBar.setTextSize(11);
                  urlBar.setMaxLines(3);
                  urlBar.setEllipsize(android.text.TextUtils.TruncateAt.MIDDLE);

                  FrameLayout.LayoutParams urlBarParams = new FrameLayout.LayoutParams(
                      ViewGroup.LayoutParams.MATCH_PARENT,
                      ViewGroup.LayoutParams.WRAP_CONTENT,
                      Gravity.TOP
                  );
                  urlBarParams.topMargin = (int) (28 * density); // under status bar
                  addContentView(urlBar, urlBarParams);

                  // Tap once = collapse to a thin line; tap again = expand.
                  urlBar.setOnClickListener(v -> {
                      if (urlBar.getMaxLines() == 0) {
                          urlBar.setMaxLines(3);
                      } else {
                          urlBar.setMaxLines(0);
                      }
                  });

                  // --- Poll the WebView URL every 400 ms ---
                  final Handler handler = new Handler(Looper.getMainLooper());
                  final String[] lastUrl = {""};
                  handler.post(new Runnable() {
                      @Override
                      public void run() {
                          String currentUrl = webView.getUrl();
                          String title = webView.getTitle();
                          if (currentUrl != null && !currentUrl.equals(lastUrl[0])) {
                              lastUrl[0] = currentUrl;
                              Log.i(TAG, "URL: " + currentUrl + "  |  title: " + title);
                              urlBar.setText("URL  " + currentUrl + "\nTITLE  " + (title == null ? "" : title));
                          }
                          handler.postDelayed(this, 400);
                      }
                  });
              }
          }
          EOF
          echo "Patched MainActivity.java:"
          cat "$APP_PKG_DIR/MainActivity.java"

      - name: Verify generated Android splash & launcher icon resources
        run: |
          set -e
          RES_DIR="android/app/src/main/res"
          if ! find "$RES_DIR" -name "splash.png" | grep -q .; then
            echo "FATAL: No splash.png was generated"
            exit 1
          fi
          for NAME in ic_launcher.png ic_launcher_round.png ic_launcher_foreground.png; do
            if ! find "$RES_DIR" -name "$NAME" | grep -q .; then
              echo "FATAL: $NAME not generated"
              exit 1
            fi
          done
          echo "Splash + launcher icons (Collinz crest) verified."

      - name: Sync placeholder webDir into Android project
        run: npx cap sync android

      - name: Verify MainActivity patches survived sync
        run: |
          set -e
          MA="android/app/src/main/java/com/collinz/school/MainActivity.java"
          for NEEDLE in "LOAD_NO_CACHE" "setWebContentsDebuggingEnabled" "CollinzNav"; do
            if ! grep -q "$NEEDLE" "$MA"; then
              echo "FATAL: '$NEEDLE' missing from MainActivity.java after sync"
              cat "$MA"
              exit 1
            fi
          done
          echo "Cache-busting + debug overlay patches verified in MainActivity.java"

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x ./gradlew

      - name: Build debug APK (auto-signed, installable on any device)
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Locate debug APK
        id: locate_debug
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No debug APK was produced."
            ls -la android/app/build/outputs/apk/debug || true
            exit 1
          fi
          echo "Found debug APK: $APK_PATH"
          SIZE=$(du -h "$APK_PATH" | cut -f1)
          echo "Size: $SIZE"
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "apk_size=$SIZE" >> "$GITHUB_OUTPUT"

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: collinz-school-LIVE-DEBUG-apk
          path: ${{ steps.locate_debug.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 30

      - name: Build unsigned release APK (for future Play Store signing)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Locate unsigned release APK
        id: locate_release
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No release APK was produced."
            ls -la android/app/build/outputs/apk/release || true
            exit 1
          fi
          SIZE=$(du -h "$APK_PATH" | cut -f1)
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "apk_size=$SIZE" >> "$GITHUB_OUTPUT"

      - name: Upload unsigned release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: collinz-school-LIVE-unsigned-release-apk
          path: ${{ steps.locate_release.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 30

      - name: Build summary
        if: always()
        run: |
          {
            echo "## Android APK Build — live wrapper"
            echo ""
            echo "- **Loads:** \`${{ env.LIVE_URL }}\` (every launch, every time)"
            echo "- **Web cache:** disabled at WebView level (LOAD_NO_CACHE + clearCache on start)"
            echo "- **Bundled web code:** none — only a redirect placeholder in case the URL ever fails"
            echo "- **Status:** ${{ job.status }}"
            echo ""
            echo "### Artifacts"
            echo ""
            if [ -n "${{ steps.locate_debug.outputs.apk_path }}" ]; then
              echo "- **\`collinz-school-LIVE-DEBUG-apk\`** (${{ steps.locate_debug.outputs.apk_size }}) — install this on phones."
            fi
            if [ -n "${{ steps.locate_release.outputs.apk_path }}" ]; then
              echo "- \`collinz-school-LIVE-unsigned-release-apk\` (${{ steps.locate_release.outputs.apk_size }}) — keep for Play Store signing later."
            fi
            echo ""
            echo "Pushing changes to https://collinz.app is now sufficient to update every installed device on next launch — no rebuild required."
          } >> "$GITHUB_STEP_SUMMARY"
