name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: "Vite build mode (production / staging / development)"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging
          - development
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "resources/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "capacitor.config.ts"
      - "vite.config.ts"
      - "tailwind.config.ts"
      - ".github/workflows/build-android-apk.yml"

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build unsigned release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        # Use `npm install` (not `npm ci`) because the committed
        # package-lock.json is currently out of sync with package.json
        # (Lovable/bun-managed lockfile drift). `install` will resolve
        # and refresh the lockfile in the runner without failing.
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Build web app (${{ github.event.inputs.build_mode || 'production' }})
        run: npm run build:${{ github.event.inputs.build_mode || 'production' }}

      - name: Setup JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-35 build-tools;35.0.0"

      - name: Add Capacitor Android platform
        run: npx cap add android

      - name: Verify Collinz brand assets exist
        run: |
          set -e
          test -f resources/icon.png || { echo "Missing resources/icon.png"; exit 1; }
          test -f resources/splash.png || { echo "Missing resources/splash.png"; exit 1; }
          ls -la resources/

      - name: Generate Android icons & splash screens from Collinz logo
        # Hard-fail if asset generation breaks so the splash never silently
        # falls back to the default Capacitor splash again.
        run: |
          npx capacitor-assets generate \
            --android \
            --iconBackgroundColor "#ffffff" \
            --iconBackgroundColorDark "#1a1a1a" \
            --splashBackgroundColor "#ffffff" \
            --splashBackgroundColorDark "#1a1a1a"

      - name: Verify generated Android splash & launcher icon resources
        run: |
          set -e
          RES_DIR="android/app/src/main/res"
          echo "--- Generated resource folders ---"
          ls -la "$RES_DIR" | grep -E "drawable|mipmap" || true

          # The SplashScreen plugin reads from androidSplashResourceName="splash"
          if ! find "$RES_DIR" -name "splash.png" | grep -q .; then
            echo "FATAL: No splash.png was generated in android/app/src/main/res/drawable-*"
            exit 1
          fi
          echo ""
          echo "Splash drawable files:"
          find "$RES_DIR" -name "splash.png" -exec ls -la {} \;

          # Launcher icons (the home-screen / app drawer icon)
          # Capacitor-assets writes these to mipmap-*/ic_launcher*.png
          MISSING_ICONS=0
          for NAME in ic_launcher.png ic_launcher_round.png ic_launcher_foreground.png; do
            if ! find "$RES_DIR" -name "$NAME" | grep -q .; then
              echo "FATAL: $NAME not generated in mipmap-*"
              MISSING_ICONS=1
            fi
          done
          if [ "$MISSING_ICONS" -ne 0 ]; then
            echo "Launcher icon generation failed -- the APK would ship with the default Capacitor icon."
            exit 1
          fi
          echo ""
          echo "Launcher icon files (Collinz crest):"
          find "$RES_DIR" -name "ic_launcher.png" -exec ls -la {} \;

      - name: Sync web build into Android project
        run: npx cap sync android

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x ./gradlew

      - name: Build debug APK (auto-signed with debug keystore, installable on any device)
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Locate debug APK
        id: locate_debug
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No debug APK was produced."
            ls -la android/app/build/outputs/apk/debug || true
            exit 1
          fi
          echo "Found debug APK: $APK_PATH"
          SIZE=$(du -h "$APK_PATH" | cut -f1)
          echo "Size: $SIZE"
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "apk_size=$SIZE" >> "$GITHUB_OUTPUT"

      - name: Upload debug APK artifact (USE THIS to install on phones)
        uses: actions/upload-artifact@v4
        with:
          name: collinz-school-${{ github.event.inputs.build_mode || 'production' }}-DEBUG-apk
          path: ${{ steps.locate_debug.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 30

      - name: Build unsigned release APK (NOT installable -- for later signing only)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Locate unsigned release APK
        id: locate_release
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No release APK was produced."
            ls -la android/app/build/outputs/apk/release || true
            exit 1
          fi
          echo "Found unsigned release APK: $APK_PATH"
          SIZE=$(du -h "$APK_PATH" | cut -f1)
          echo "Size: $SIZE"
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "apk_size=$SIZE" >> "$GITHUB_OUTPUT"

      - name: Upload unsigned release APK artifact (for later signing -- cannot be installed directly)
        uses: actions/upload-artifact@v4
        with:
          name: collinz-school-${{ github.event.inputs.build_mode || 'production' }}-unsigned-release-apk
          path: ${{ steps.locate_release.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 30

      - name: Build summary
        if: always()
        run: |
          {
            echo "## Android APK Build"
            echo ""
            echo "- **Mode:** \`${{ github.event.inputs.build_mode || 'production' }}\`"
            echo "- **Status:** ${{ job.status }}"
            echo ""
            echo "### Artifacts produced"
            echo ""
            if [ -n "${{ steps.locate_debug.outputs.apk_path }}" ]; then
              echo "#### 1. \`collinz-school-...-DEBUG-apk\` (${{ steps.locate_debug.outputs.apk_size }}) — **install this**"
              echo ""
              echo "- Signed with the universal Android debug keystore."
              echo "- Can be side-loaded onto any Android device with \"Install unknown apps\" enabled."
              echo "- Use for personal testing, demos, internal QA."
              echo ""
            fi
            if [ -n "${{ steps.locate_release.outputs.apk_path }}" ]; then
              echo "#### 2. \`collinz-school-...-unsigned-release-apk\` (${{ steps.locate_release.outputs.apk_size }}) — for signing later"
              echo ""
              echo "- **Cannot be installed directly** — Android rejects unsigned APKs (\"package appears to be invalid\")."
              echo "- Use this as the input to a release-signing step / Play Store upload after generating a keystore."
            fi
            echo ""
            echo "Download from the **Artifacts** section at the top of this run."
          } >> "$GITHUB_STEP_SUMMARY"
