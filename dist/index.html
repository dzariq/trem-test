<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trem</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: #ffffff;
      }
      .wrap {
        height: 100%;
        display: grid;
        place-items: center;
      }
      .card {
        padding: 28px 22px;
        border: 1px solid rgba(0, 0, 0, 0.12);
        border-radius: 16px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        min-width: 220px;
        text-align: center;
      }
      .title {
        font-size: 28px;
        font-weight: 750;
        letter-spacing: -0.02em;
      }
      .sub {
        margin-top: 10px;
        color: #444;
        font-size: 13px;
      }
      .panel {
        margin-top: 14px;
        text-align: left;
        font-size: 12px;
        color: #222;
        padding: 12px 12px;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.03);
        border: 1px solid rgba(0, 0, 0, 0.08);
        min-width: 260px;
      }
      .row {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        margin: 6px 0;
      }
      .label {
        color: #333;
      }
      .value {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        color: #111;
      }
      .pill {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
      }
      .ok { background: rgba(16, 185, 129, 0.14); color: rgb(5, 120, 84); }
      .bad { background: rgba(239, 68, 68, 0.14); color: rgb(185, 28, 28); }
      .muted { color: #666; }
      .logs {
        margin-top: 10px;
        max-height: 180px;
        overflow: auto;
        padding: 10px;
        background: rgba(0, 0, 0, 0.045);
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 10px;
      }
      .logline {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 11px;
        color: #111;
        margin: 6px 0;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="title">Hi Dzariq</div>
        <div class="sub">Trem native wrapper</div>

        <div class="panel" id="pushPanel">
          <div class="row">
            <div class="label">Topic (attempt)</div>
            <div class="value" id="topicName">trem_test</div>
          </div>
          <div class="row">
            <div class="label">Subscribe status</div>
            <div class="value" id="topicStatus"><span class="pill muted">pending</span></div>
          </div>
          <div class="row">
            <div class="label">Error</div>
            <div class="value muted" id="topicErr">—</div>
          </div>
          <div class="row">
            <div class="label">Last update</div>
            <div class="value muted" id="topicTs">—</div>
          </div>

          <div class="row" style="margin-top:10px">
            <div class="label">Logs</div>
            <div class="value muted" id="logHint">native → UI</div>
          </div>
          <div class="logs" id="logBox"></div>
        </div>
      </div>
    </div>

    <script>
      const elStatus = document.getElementById("topicStatus");
      const elErr = document.getElementById("topicErr");
      const elTs = document.getElementById("topicTs");
      const logBox = document.getElementById("logBox");

      function addLog(ts, msg) {
        const line = document.createElement("div");
        line.className = "logline";
        const t = ts ? new Date(ts).toLocaleTimeString() : new Date().toLocaleTimeString();
        line.textContent = `[${t}] ${msg}`;
        logBox.appendChild(line);
        logBox.scrollTop = logBox.scrollHeight;
      }

      function setStatus(ok, error, ts) {
        const pill = document.createElement("span");
        pill.className = "pill " + (ok ? "ok" : "bad");
        pill.textContent = ok ? "success" : "failed";
        elStatus.innerHTML = "";
        elStatus.appendChild(pill);
        elErr.textContent = error ? String(error) : "—";
        elTs.textContent = ts ? new Date(ts).toLocaleString() : new Date().toLocaleString();
      }

      // Android native sends CustomEvent('tremPush', {detail:{topic,ok,error,ts}})
      window.addEventListener("tremPush", (e) => {
        const d = (e && e.detail) || {};
        if (typeof d.ok === "boolean") setStatus(d.ok, d.error, d.ts);
      });

      // Native log stream
      window.addEventListener("tremLog", (e) => {
        const d = (e && e.detail) || {};
        if (d && d.msg) addLog(d.ts, d.msg);
      });

      // If native already set window.__tremPush before JS loaded
      if (window.__tremPush && typeof window.__tremPush.ok === "boolean") {
        setStatus(window.__tremPush.ok, window.__tremPush.error, window.__tremPush.ts);
      }
      // If native logs were set before JS loaded
      if (Array.isArray(window.__tremLogs)) {
        window.__tremLogs.slice(-50).forEach((l) => addLog(l.ts, l.msg));
      }

      // Fallback: if nothing arrives after 5s, mark as failed to avoid "pending" forever.
      setTimeout(() => {
        const has = window.__tremPush && typeof window.__tremPush.ok === "boolean";
        if (!has) setStatus(false, "No native status received", Date.now());
      }, 5000);
    </script>
  </body>
</html>
