<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trem</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: #ffffff;
      }
      .wrap {
        height: 100%;
        display: grid;
        place-items: center;
      }
      .card {
        padding: 28px 22px;
        border: 1px solid rgba(0, 0, 0, 0.12);
        border-radius: 16px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        min-width: 220px;
        text-align: center;
      }
      .title {
        font-size: 28px;
        font-weight: 750;
        letter-spacing: -0.02em;
      }
      .sub {
        margin-top: 10px;
        color: #444;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="title">Hi Dzariq</div>
        <div class="sub">Trem native wrapper</div>
      </div>
    </div>
  </body>
</html>
